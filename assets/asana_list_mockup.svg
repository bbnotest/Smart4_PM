  <!-- Milestone -->
  <rect x="36" y="380" width="12" height="12" transform="rotate(45 42 386)" fill="#F06A6A"/>
  <text x="60" y="390" font-size="11" font-weight="700" fill="#F06A6A">M1 프로토타입 (마일스톤)</text>
  <text x="636" y="390" font-size="10" fill="#F06A6A">7/17</text>
