    <circle cx="580" cy="122" r="8" fill="#57D9A3"/><text x="580" y="125" font-size="7" fill="#fff" text-anchor="middle">DEV</text>
    <text x="636" y="126" font-size="10" fill="#6F7782">7/08</text>
    <rect x="712" y="116" width="52" height="14" rx="7" fill="#FFE6E6"/><text x="738" y="126" font-size="9" fill="#C8553D" text-anchor="middle">High</text>

    <circle cx="22" cy="146" r="6" fill="none" stroke="#B6B6B6"/><text x="36" y="150">US-02 공격 입력</text>
    <circle cx="580" cy="146" r="8" fill="#57D9A3"/><text x="580" y="149" font-size="7" fill="#fff" text-anchor="middle">DEV</text>
