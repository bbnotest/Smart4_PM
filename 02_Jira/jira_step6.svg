<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif">
  <rect width="760" height="440" fill="#ffffff"/>
  <text x="24" y="30" font-size="18" font-weight="700" fill="#172B4D">스프린트 번다운 차트 — 남은 작업이 0으로 줄어드는가?</text>

  <g stroke="#EBECF0" stroke-width="1">
    <line x1="80" y1="75" x2="710" y2="75"/>
    <line x1="80" y1="145" x2="710" y2="145"/>
    <line x1="80" y1="215" x2="710" y2="215"/>
    <line x1="80" y1="285" x2="710" y2="285"/>
  </g>
  <line x1="80" y1="75" x2="80" y2="355" stroke="#5E6C84" stroke-width="1.5"/>
  <line x1="80" y1="355" x2="710" y2="355" stroke="#5E6C84" stroke-width="1.5"/>
  <g font-size="12" fill="#5E6C84" text-anchor="end">
    <text x="70" y="79">16</text><text x="70" y="149">12</text><text x="70" y="219">8</text><text x="70" y="289">4</text><text x="70" y="359">0</text>
  </g>
  <text x="28" y="215" font-size="12" fill="#5E6C84" transform="rotate(-90 28 215)" text-anchor="middle">남은 작업(스토리 포인트)</text>
  <text x="395" y="392" font-size="12" fill="#5E6C84" text-anchor="middle">스프린트 일자  ·  시작 → 종료</text>
  <text x="80" y="373" font-size="11" fill="#5E6C84" text-anchor="middle">시작</text>
  <text x="700" y="373" font-size="11" fill="#5E6C84" text-anchor="middle">종료</text>

  <line x1="80" y1="75" x2="700" y2="355" stroke="#8993A4" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="556" y="300" font-size="12" fill="#8993A4" transform="rotate(24 556 300)">지침(이상적 감소)</text>

  <polyline points="80,75 149,110 218,128 287,128 356,128 425,145 494,198 562,250 631,285 700,320" fill="none" stroke="#D9531E" stroke-width="3"/>
  <g fill="#D9531E"><circle cx="80" cy="75" r="4"/><circle cx="218" cy="128" r="4"/><circle cx="356" cy="128" r="4"/><circle cx="494" cy="198" r="4"/><circle cx="700" cy="320" r="4"/></g>

  <rect x="356" y="80" width="266" height="46" rx="8" fill="#FFEBE6" stroke="#D9531E" stroke-width="1.5"/>
  <text x="370" y="100" font-size="13" font-weight="700" fill="#BF2600">⚠ 평평한 구간 = 일이 안 줄어듦</text>
  <text x="370" y="118" font-size="12" fill="#42526E">= 지연 위험! 범위를 줄여야 할 신호</text>
  <line x1="356" y1="115" x2="290" y2="128" stroke="#D9531E" stroke-width="1.5" stroke-dasharray="3 3"/>

  <g font-size="13">
    <line x1="232" y1="416" x2="272" y2="416" stroke="#D9531E" stroke-width="3"/>
    <text x="280" y="420" fill="#172B4D" font-weight="700">남은 작업(실제)</text>
    <line x1="430" y1="416" x2="470" y2="416" stroke="#8993A4" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="478" y="420" fill="#172B4D">지침(이상적)</text>
  </g>
