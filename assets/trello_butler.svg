<svg viewBox="0 0 640 230" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Malgun Gothic', Arial, sans-serif">
  <text x="16" y="26" font-size="15" font-weight="700" fill="#172B4D">Butler 자동화 = 언제(Trigger) → 무엇을(Action)</text>

  <!-- Trigger -->
  <rect x="20" y="50" width="260" height="120" rx="10" fill="#EAF0FF" stroke="#4C9AFF"/>
  <rect x="20" y="50" width="260" height="28" rx="10" fill="#4C9AFF"/>
  <text x="34" y="69" font-size="12" font-weight="700" fill="#FFFFFF">① 언제 (Trigger)</text>
  <text x="40" y="108" font-size="13" fill="#172B4D">🃏 카드가</text>
  <text x="40" y="130" font-size="13" font-weight="700" fill="#172B4D">'Done' 리스트로 이동</text>
  <text x="40" y="150" font-size="13" fill="#172B4D">하면…</text>

  <!-- arrow -->
  <line x1="290" y1="110" x2="350" y2="110" stroke="#5E6C84" stroke-width="3"/>
  <path d="M350 110 l-12 -7 l0 14 z" fill="#5E6C84"/>

  <!-- Action -->
  <rect x="360" y="50" width="260" height="120" rx="10" fill="#E3FCEF" stroke="#36B37E"/>
  <rect x="360" y="50" width="260" height="28" rx="10" fill="#36B37E"/>
  <text x="374" y="69" font-size="12" font-weight="700" fill="#FFFFFF">② 무엇을 (Action)</text>
  <text x="380" y="108" font-size="13" fill="#172B4D">📅 마감일을</text>
  <text x="380" y="130" font-size="13" font-weight="700" fill="#172B4D">'완료'로 표시</text>
  <text x="380" y="150" font-size="13" fill="#172B4D">한다</text>

  <text x="20" y="200" font-size="11" fill="#7A869A">반복 작업을 자동으로 처리 · 무료도 월 250회 실행 · "언제 → 무엇을" 순서만 기억하세요</text>
</svg>
