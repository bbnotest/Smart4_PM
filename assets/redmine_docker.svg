<svg viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Malgun Gothic', Arial, sans-serif">
  <text x="16" y="24" font-size="15" font-weight="700" fill="#2A2A2A">Redmine 띄우기 — 명령어 한 줄이면 끝</text>

  <!-- terminal -->
  <rect x="16" y="44" width="330" height="158" rx="8" fill="#1E1E2E"/>
  <rect x="16" y="44" width="330" height="22" rx="8" fill="#2D2D44"/>
  <circle cx="32" cy="55" r="4" fill="#FF5F56"/><circle cx="46" cy="55" r="4" fill="#FFBD2E"/><circle cx="60" cy="55" r="4" fill="#27C93F"/>
  <text x="180" y="59" font-size="9" fill="#9AA0B4" text-anchor="middle">PowerShell / 터미널</text>
  <g font-family="'Cascadia Code',Consolas,monospace" font-size="11">
    <text x="30" y="90" fill="#7DD3FC">$ docker run -d --name redmine \</text>
    <text x="30" y="108" fill="#7DD3FC">    -p 3000:3000 redmine:6.1</text>
    <text x="30" y="134" fill="#86EFAC">9f3a1b… 컨테이너 시작됨 ✓</text>
    <text x="30" y="160" fill="#FBBF24">→ http://localhost:3000 접속</text>
    <text x="30" y="184" fill="#E5E7EB">_</text>
  </g>

  <!-- arrow -->
  <line x1="352" y1="123" x2="388" y2="123" stroke="#888" stroke-width="3"/>
  <path d="M388 123 l-12 -7 l0 14 z" fill="#888"/>

  <!-- browser -->
  <rect x="394" y="44" width="230" height="158" rx="8" fill="#FFFFFF" stroke="#D0D0D0"/>
  <rect x="394" y="44" width="230" height="24" rx="8" fill="#EFEFEF"/>
  <rect x="414" y="50" width="190" height="13" rx="6" fill="#fff" stroke="#D0D0D0"/>
  <text x="422" y="60" font-size="9" fill="#555">🔒 localhost:3000</text>
  <text x="509" y="92" font-size="13" font-weight="700" fill="#A1322B" text-anchor="middle">Redmine</text>
  <text x="414" y="118" font-size="10" fill="#555">로그인(Sign in)</text>
  <rect x="414" y="124" width="190" height="18" rx="3" fill="#F7F7F7" stroke="#DDD"/><text x="420" y="137" font-size="9" fill="#888">admin</text>
  <rect x="414" y="148" width="190" height="18" rx="3" fill="#F7F7F7" stroke="#DDD"/><text x="420" y="161" font-size="9" fill="#888">••••• (admin)</text>
  <rect x="414" y="174" width="64" height="18" rx="3" fill="#A1322B"/><text x="446" y="187" font-size="9" fill="#fff" text-anchor="middle">로그인</text>

  <text x="16" y="226" font-size="11" fill="#888">기본 계정 admin / admin (첫 로그인 시 비밀번호 변경) · 포트 충돌 시 -p 3001:3000 으로</text>
</svg>
