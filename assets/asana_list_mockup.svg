    <rect x="712" y="140" width="52" height="14" rx="7" fill="#FFE6E6"/><text x="738" y="150" font-size="9" fill="#C8553D" text-anchor="middle">High</text>

    <circle cx="22" cy="170" r="6" fill="none" stroke="#B6B6B6"/><text x="36" y="174">US-04 턴제 전투(HP)</text>
