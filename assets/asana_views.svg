<svg viewBox="0 0 640 250" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Malgun Gothic', Arial, sans-serif">
  <text x="16" y="24" font-size="15" font-weight="700" fill="#151B26">Asana의 강점 — 같은 데이터, 4가지 보기(View)</text>

  <!-- List view -->
  <rect x="16" y="44" width="148" height="150" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
  <rect x="16" y="44" width="148" height="24" rx="8" fill="#FCEBEA"/>
  <text x="28" y="60" font-size="11" font-weight="700" fill="#C8553D">≣ List (무료)</text>
  <g fill="#EAEAEA"><rect x="28" y="80" width="124" height="12" rx="3"/><rect x="28" y="100" width="124" height="12" rx="3"/><rect x="28" y="120" width="124" height="12" rx="3"/><rect x="28" y="140" width="124" height="12" rx="3"/><rect x="28" y="160" width="90" height="12" rx="3"/></g>
  <circle cx="34" cy="86" r="3" fill="#57D9A3"/><circle cx="34" cy="106" r="3" fill="#57D9A3"/><circle cx="34" cy="126" r="3" fill="#998DD9"/>

  <!-- Board view -->
  <rect x="170" y="44" width="148" height="150" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
  <rect x="170" y="44" width="148" height="24" rx="8" fill="#FCEBEA"/>
  <text x="182" y="60" font-size="11" font-weight="700" fill="#C8553D">▦ Board (무료)</text>
  <rect x="182" y="78" width="58" height="108" rx="5" fill="#F4F4F6"/>
  <rect x="248" y="78" width="58" height="108" rx="5" fill="#F4F4F6"/>
  <rect x="188" y="86" width="46" height="20" rx="4" fill="#fff" stroke="#E0E0E0"/>
  <rect x="188" y="112" width="46" height="20" rx="4" fill="#fff" stroke="#E0E0E0"/>
  <rect x="254" y="86" width="46" height="20" rx="4" fill="#fff" stroke="#E0E0E0"/>

  <!-- Calendar view -->
  <rect x="324" y="44" width="148" height="150" rx="8" fill="#FFFFFF" stroke="#E0E0E0"/>
  <rect x="324" y="44" width="148" height="24" rx="8" fill="#FCEBEA"/>
  <text x="336" y="60" font-size="11" font-weight="700" fill="#C8553D">▥ Calendar (무료)</text>
  <g stroke="#EEE">
    <line x1="336" y1="98" x2="460" y2="98"/><line x1="336" y1="128" x2="460" y2="128"/><line x1="336" y1="158" x2="460" y2="158"/>
    <line x1="377" y1="78" x2="377" y2="186"/><line x1="418" y1="78" x2="418" y2="186"/>
  </g>
  <rect x="380" y="101" width="35" height="10" rx="3" fill="#F06A6A"/>
  <rect x="339" y="131" width="35" height="10" rx="3" fill="#57D9A3"/>

  <!-- Timeline view (locked) -->
  <rect x="478" y="44" width="148" height="150" rx="8" fill="#F7F7F7" stroke="#E0E0E0"/>
  <rect x="478" y="44" width="148" height="24" rx="8" fill="#ECECEC"/>
  <text x="490" y="60" font-size="11" font-weight="700" fill="#9A9A9A">📈 Timeline 🔒</text>
  <g fill="#DADADA"><rect x="490" y="84" width="70" height="10" rx="3"/><rect x="520" y="104" width="80" height="10" rx="3"/><rect x="500" y="124" width="60" height="10" rx="3"/></g>
  <text x="552" y="170" font-size="11" font-weight="700" fill="#B0B0B0" text-anchor="middle">유료(Starter+)</text>

  <text x="16" y="222" font-size="11" fill="#9A9A9A">탭만 누르면 같은 데이터가 다른 모습으로 — List·Board·Calendar는 무료, Timeline(간트)은 유료</text>
</svg>
