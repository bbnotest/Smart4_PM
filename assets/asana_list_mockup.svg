    <text x="60" y="247" font-size="10" fill="#6F7782">⤷ 방 생성</text>
    <text x="60" y="269" font-size="10" fill="#6F7782">⤷ 복도 연결</text>
    <text x="60" y="291" font-size="10" fill="#6F7782">⤷ 계단 배치</text>

    <circle cx="22" cy="312" r="6" fill="none" stroke="#B6B6B6"/><text x="36" y="316">US-06 적 추적 AI</text>
    <circle cx="580" cy="312" r="8" fill="#57D9A3"/><text x="580" y="315" font-size="7" fill="#fff" text-anchor="middle">DEV</text>
    <text x="636" y="316" font-size="10" fill="#6F7782">7/26</text>
    <rect x="712" y="306" width="52" height="14" rx="7" fill="#FFF4E6"/><text x="738" y="316" font-size="9" fill="#B07B00" text-anchor="middle">Med</text>
  </g>

  <!-- Section E5 -->
  <rect x="0" y="326" width="960" height="24" fill="#F4F4F6"/>
  <circle cx="20" cy="338" r="4" fill="#998DD9"/><text x="32" y="342" font-size="11" font-weight="700" fill="#151B26">▾ E5 UI/UX</text>
  <g font-size="11" fill="#151B26">
