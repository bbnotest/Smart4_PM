<svg viewBox="0 0 960 410" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Malgun Gothic', Arial, sans-serif">
  <text x="14" y="22" font-size="15" font-weight="700" fill="#151B26">Asana List 뷰 목업 — Pixel Dungeon (섹션·태스크·서브태스크·마일스톤)</text>
  <rect x="0" y="34" width="960" height="368" rx="6" fill="#FFFFFF" stroke="#E8E8E8"/>
