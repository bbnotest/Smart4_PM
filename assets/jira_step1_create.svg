<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="900" height="520" fill="#F4F5F7"/>
  <text x="30" y="32" font-size="13" fill="#5E6C84">Jira · 1단계 — 스크럼 프로젝트 만들기 (실제 화면 재현)</text>

  <!-- form window -->
  <rect x="30" y="50" width="470" height="446" rx="10" fill="#FFFFFF" stroke="#DFE1E6"/>
  <text x="55" y="92" font-size="21" font-weight="700" fill="#172B4D">스페이스 이름 지정</text>
  <text x="55" y="115" font-size="12" fill="#5E6C84">필수 필드는 별표(*)로 표시되어 있습니다</text>

  <text x="55" y="150" font-size="12" font-weight="600" fill="#42526E">이름 *</text>
  <rect x="55" y="158" width="420" height="40" rx="5" fill="#FAFBFC" stroke="#0C66E4" stroke-width="2"/>
  <text x="68" y="183" font-size="15" fill="#172B4D">Pixel Dungeon</text>

  <text x="55" y="230" font-size="12" font-weight="600" fill="#42526E">스페이스를 관리하는 방법 *</text>
  <rect x="55" y="238" width="420" height="40" rx="5" fill="#FFFFFF" stroke="#C1C7D0"/>
  <text x="72" y="263" font-size="15" fill="#172B4D">팀이 관리 (Team-managed)</text>
  <text x="458" y="263" font-size="12" fill="#5E6C84">▾</text>

  <text x="55" y="310" font-size="12" font-weight="600" fill="#42526E">키 *</text>
  <rect x="55" y="318" width="150" height="40" rx="5" fill="#FFFFFF" stroke="#C1C7D0"/>
  <text x="72" y="343" font-size="15" fill="#172B4D">PD</text>

  <text x="55" y="390" font-size="12" font-weight="600" fill="#42526E">템플릿</text>
  <rect x="55" y="398" width="420" height="54" rx="6" fill="#FFFFFF" stroke="#DFE1E6"/>
  <circle cx="84" cy="425" r="13" fill="#DEEBFF"/>
  <path d="M78 425a6 6 0 1 1 2 4" fill="none" stroke="#1868DB" stroke-width="2"/>
  <text x="108" y="421" font-size="14" font-weight="700" fill="#172B4D">스크럼</text>
  <text x="108" y="439" font-size="10.5" fill="#5E6C84">보드 · 백로그 · 타임라인으로 목표를 향해 나아가세요</text>

  <rect x="395" y="466" width="80" height="32" rx="5" fill="#0C66E4"/>
  <text x="435" y="487" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">다음</text>

  <!-- callouts -->
  <rect x="535" y="56" width="338" height="80" rx="8" fill="#FFF7D6" stroke="#E2C636"/>
  <text x="552" y="80" font-size="13" font-weight="700" fill="#172B4D">① 시작 경로</text>
  <text x="552" y="101" font-size="12.5" fill="#42526E">왼쪽 메뉴 '스페이스' 옆  +  →  스페이스 템플릿</text>
  <text x="552" y="120" font-size="12.5" fill="#42526E">→  스크럼  →  '템플릿 사용'</text>

  <rect x="535" y="150" width="338" height="72" rx="8" fill="#E3FCEF" stroke="#57D9A3"/>
  <text x="552" y="174" font-size="13" font-weight="700" fill="#172B4D">② 팀이 관리(Team-managed) — 꼭!</text>
  <text x="552" y="195" font-size="12.5" fill="#42526E">'회사가 관리'를 고르면 메뉴가 완전히</text>
  <text x="552" y="213" font-size="12.5" fill="#42526E">달라집니다.</text>
  <line x1="535" y1="195" x2="479" y2="258" stroke="#36B37E" stroke-width="2" stroke-dasharray="4 3"/>

  <rect x="535" y="296" width="338" height="52" rx="8" fill="#DEEBFF" stroke="#4C9AFF"/>
  <text x="552" y="320" font-size="13" font-weight="700" fill="#172B4D">③ 키는 'PD'로 자동 생성</text>
  <text x="552" y="338" font-size="12.5" fill="#42526E">이름을 입력하면 자동으로 채워집니다.</text>

  <rect x="535" y="416" width="338" height="80" rx="8" fill="#EAE6FF" stroke="#8777D9"/>
  <text x="552" y="440" font-size="13" font-weight="700" fill="#172B4D">④ '다음' → 4단계 마법사</text>
  <text x="552" y="461" font-size="12.5" fill="#42526E">설정·보기는 그대로 '다음', 멤버 초대·도구</text>
  <text x="552" y="479" font-size="12.5" fill="#42526E">연결은 '나중에' → 마지막에 '완료'</text>
  <line x1="535" y1="455" x2="479" y2="482" stroke="#8777D9" stroke-width="2" stroke-dasharray="4 3"/>
</svg>
