<svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Malgun Gothic', Arial, sans-serif">
  <text x="14" y="22" font-size="15" font-weight="700" fill="#172B4D">Jira Timeline 목업 — 에픽 일정·의존성·마일스톤 (무료)</text>
  <rect x="0" y="34" width="960" height="272" rx="6" fill="#FFFFFF" stroke="#DFE1E6"/>
  <!-- left header -->
  <rect x="0" y="34" width="170" height="272" fill="#FAFBFC"/>
  <text x="14" y="54" font-size="11" font-weight="700" fill="#5E6C84">EPIC</text>
  <!-- month headers -->
  <rect x="176" y="40" width="384" height="18" fill="#F4F5F7"/><text x="368" y="53" font-size="10" font-weight="700" fill="#5E6C84" text-anchor="middle">2026년 7월</text>
  <rect x="560" y="40" width="384" height="18" fill="#EEF1F5"/><text x="752" y="53" font-size="10" font-weight="700" fill="#5E6C84" text-anchor="middle">2026년 8월</text>
  <!-- week grid -->
  <g stroke="#EBECF0" stroke-width="1">
    <line x1="176" y1="60" x2="176" y2="306"/><line x1="272" y1="60" x2="272" y2="306"/>
    <line x1="368" y1="60" x2="368" y2="306"/><line x1="464" y1="60" x2="464" y2="306"/>
    <line x1="560" y1="60" x2="560" y2="306"/><line x1="656" y1="60" x2="656" y2="306"/>
    <line x1="752" y1="60" x2="752" y2="306"/><line x1="848" y1="60" x2="848" y2="306"/>
    <line x1="944" y1="60" x2="944" y2="306"/>
  </g>
  <g font-size="9" fill="#7A869A" text-anchor="middle">
    <text x="224" y="73">7/06</text><text x="320" y="73">7/13</text><text x="416" y="73">7/20</text><text x="512" y="73">7/27</text>
    <text x="608" y="73">8/03</text><text x="704" y="73">8/10</text><text x="800" y="73">8/17</text><text x="896" y="73">8/24</text>
  </g>

  <!-- epic rows -->
  <g font-size="11" fill="#172B4D">
    <text x="14" y="100">E1 기획</text>
    <rect x="176" y="90" width="192" height="16" rx="4" fill="#8993A4"/><text x="184" y="102" font-size="9" fill="#fff">GDD·밸런스</text>

    <text x="14" y="134">E2 코어</text>
    <rect x="176" y="124" width="288" height="16" rx="4" fill="#4C9AFF"/><text x="184" y="136" font-size="9" fill="#fff">러닝·점프·충돌</text>

    <text x="14" y="168">E3 던전</text>
    <rect x="368" y="158" width="192" height="16" rx="4" fill="#57D9A3"/><text x="376" y="170" font-size="9" fill="#fff">생성·적·아이템</text>

    <text x="14" y="202">E5 UI·메타</text>
    <rect x="464" y="192" width="192" height="16" rx="4" fill="#998DD9"/><text x="472" y="204" font-size="9" fill="#fff">상점·HUD·결과</text>

    <text x="14" y="236">E7 QA·출시</text>
    <rect x="656" y="226" width="288" height="16" rx="4" fill="#FF7452"/><text x="664" y="238" font-size="9" fill="#fff">밸런싱·빌드·스토어</text>
  </g>

  <!-- dependency arrow E2 -> E3 -->
  <line x1="464" y1="132" x2="464" y2="166" stroke="#5E6C84" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M464 166 l-3 -5 l6 0 z" fill="#5E6C84"/>
  <text x="470" y="152" font-size="8" fill="#5E6C84">의존성</text>

  <!-- milestone lane -->
  <line x1="368" y1="60" x2="368" y2="306" stroke="#FF5630" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="560" y1="60" x2="560" y2="306" stroke="#FF5630" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="752" y1="60" x2="752" y2="306" stroke="#FF5630" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="944" y1="60" x2="944" y2="306" stroke="#FF5630" stroke-width="1" stroke-dasharray="4,3"/>
  <g>
    <rect x="356" y="262" width="24" height="14" rx="2" fill="#FF5630"/><text x="368" y="272" font-size="9" fill="#fff" text-anchor="middle">M1</text>
    <rect x="548" y="262" width="24" height="14" rx="2" fill="#FF5630"/><text x="560" y="272" font-size="9" fill="#fff" text-anchor="middle">M2</text>
    <rect x="740" y="262" width="24" height="14" rx="2" fill="#FF5630"/><text x="752" y="272" font-size="9" fill="#fff" text-anchor="middle">M3</text>
    <rect x="920" y="262" width="24" height="14" rx="2" fill="#FF5630"/><text x="932" y="272" font-size="9" fill="#fff" text-anchor="middle">M4</text>
  </g>
  <text x="180" y="296" font-size="9" fill="#7A869A">막대=에픽 기간 · 점선화살표=의존성 · 빨강세로선=마일스톤(버전/릴리스)</text>
</svg>
