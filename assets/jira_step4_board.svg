<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <rect width="900" height="540" fill="#F4F5F7"/>
  <text x="30" y="30" font-size="13" fill="#5E6C84">Jira · 4단계 — 스프린트 시작 후 보드 (실제 화면 재현)</text>

  <!-- board header -->
  <rect x="30" y="46" width="840" height="40" rx="8" fill="#FFFFFF" stroke="#DFE1E6"/>
  <text x="46" y="71" font-size="15" font-weight="700" fill="#172B4D">Pixel Dungeon — 스크럼 보드</text>
  <rect x="748" y="55" width="106" height="24" rx="5" fill="#FFFFFF" stroke="#C1C7D0"/>
  <text x="801" y="71" font-size="12" fill="#42526E" text-anchor="middle">스프린트 완료</text>

  <!-- columns -->
  <g>
    <rect x="30" y="100" width="200" height="332" rx="8" fill="#F1F2F4"/>
    <text x="46" y="126" font-size="13" font-weight="700" fill="#42526E">할 일</text>
    <circle cx="78" cy="121" r="9" fill="#DCDFE4"/><text x="78" y="125" font-size="11" fill="#42526E" text-anchor="middle">2</text>
  </g>
  <g>
    <rect x="240" y="100" width="200" height="332" rx="8" fill="#F1F2F4"/>
    <text x="256" y="126" font-size="13" font-weight="700" fill="#42526E">진행 중</text>
    <circle cx="300" cy="121" r="9" fill="#DCDFE4"/><text x="300" y="125" font-size="11" fill="#42526E" text-anchor="middle">1</text>
  </g>
  <g>
    <rect x="450" y="100" width="200" height="332" rx="8" fill="#F1F2F4"/>
    <text x="466" y="126" font-size="13" font-weight="700" fill="#42526E">검토 중</text>
    <circle cx="510" cy="121" r="9" fill="#DCDFE4"/><text x="510" y="125" font-size="11" fill="#42526E" text-anchor="middle">0</text>
  </g>
  <g>
    <rect x="660" y="100" width="200" height="332" rx="8" fill="#F1F2F4"/>
    <text x="676" y="126" font-size="13" font-weight="700" fill="#42526E">완료</text>
    <circle cx="708" cy="121" r="9" fill="#DCDFE4"/><text x="708" y="125" font-size="11" fill="#42526E" text-anchor="middle">0</text>
  </g>

  <!-- card helper: green bookmark = Story -->
  <!-- 할 일 cards -->
  <g>
    <rect x="44" y="142" width="172" height="58" rx="6" fill="#FFFFFF" stroke="#DFE1E6"/>
    <text x="60" y="170" font-size="13" fill="#172B4D">US-02 공격 입력</text>
    <path d="M60 182 h11 v15 l-5.5 -4 l-5.5 4 z" fill="#36B37E"/>
    <text x="80" y="194" font-size="11" fill="#5E6C84">PD-2</text>
  </g>
  <g>
    <rect x="44" y="212" width="172" height="58" rx="6" fill="#FFFFFF" stroke="#DFE1E6"/>
    <text x="60" y="240" font-size="13" fill="#172B4D">US-04 턴제 전투(HP)</text>
    <path d="M60 252 h11 v15 l-5.5 -4 l-5.5 4 z" fill="#36B37E"/>
    <text x="80" y="264" font-size="11" fill="#5E6C84">PD-4</text>
  </g>
  <!-- 진행 중 card -->
  <g>
    <rect x="254" y="142" width="172" height="58" rx="6" fill="#FFFFFF" stroke="#DFE1E6"/>
    <text x="270" y="170" font-size="13" fill="#172B4D">US-01 플레이어 이동</text>
    <path d="M270 182 h11 v15 l-5.5 -4 l-5.5 4 z" fill="#36B37E"/>
    <text x="290" y="194" font-size="11" fill="#5E6C84">PD-1</text>
  </g>

  <!-- drag arrow -->
  <path d="M220 171 C 234 171, 240 171, 250 171" fill="none" stroke="#0C66E4" stroke-width="2" stroke-dasharray="5 3"/>
  <path d="M250 171 l-7 -4 v8 z" fill="#0C66E4"/>

  <!-- bottom callouts -->
  <rect x="30" y="450" width="410" height="74" rx="8" fill="#DEEBFF" stroke="#4C9AFF"/>
  <text x="46" y="474" font-size="13" font-weight="700" fill="#172B4D">카드를 끌어 옆 컬럼으로 이동</text>
  <text x="46" y="494" font-size="12.5" fill="#42526E">할 일 → 진행 중 → 검토 중 → 완료</text>
  <text x="46" y="512" font-size="12.5" fill="#42526E">(컬럼 구성은 프로젝트마다 다를 수 있어요)</text>

  <rect x="460" y="450" width="410" height="74" rx="8" fill="#FFF7D6" stroke="#E2C636"/>
  <text x="476" y="474" font-size="13" font-weight="700" fill="#172B4D">'스프린트 시작' 다이얼로그</text>
  <text x="476" y="494" font-size="12.5" fill="#42526E">기간 = 2주, Sprint goal = 'M1 프로토타입'</text>
  <text x="476" y="512" font-size="12.5" fill="#42526E">입력 후 '시작' → 보드로 전환됩니다</text>
</svg>
