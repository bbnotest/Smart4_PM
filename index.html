<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 PM 협업툴 1주 과정 · LMS</title>

  <!-- Markdown / Diagram / Code highlight (CDN: 최초 로드시 인터넷 필요) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
  <link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github.min.css" />
  <link id="hljs-dark"  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github-dark.min.css" disabled />

  <link rel="stylesheet" href="lms/styles.css" />
</head>
<body>
  <!-- 상단바 -->
  <header class="topbar">
    <button id="menuBtn" class="icon-btn" title="메뉴" aria-label="메뉴">☰</button>
    <div class="brand">
      <span class="brand-mark">🎮</span>
      <div class="brand-text">
        <strong id="brandTitle">게임 PM 협업툴 과정</strong>
        <small id="brandSub">Jira · Asana · Redmine · Trello</small>
      </div>
    </div>

    <div class="topbar-progress" title="전체 진도">
      <div class="bar"><span id="topProgressFill"></span></div>
      <span id="topProgressPct" class="pct">0%</span>
    </div>

    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="검색 (제목 필터 · Enter=전체검색)" autocomplete="off" />
    </div>

    <button id="themeBtn" class="icon-btn" title="다크/라이트" aria-label="테마">🌙</button>
  </header>

  <div class="layout">
    <!-- 사이드바 -->
    <nav id="sidebar" class="sidebar" aria-label="강의 목록">
      <a href="#/" id="homeLink" class="home-link">🏠 대시보드</a>
      <div id="navTree"><!-- JS가 채움 --></div>
      <div class="sidebar-foot">
        <button id="resetBtn" class="text-btn" title="모든 진도/체크 초기화">↺ 진도 초기화</button>
      </div>
    </nav>
    <div id="backdrop" class="backdrop" hidden></div>

    <!-- 콘텐츠 -->
    <main class="main">
      <div id="content" class="content"><!-- JS가 채움 --></div>
    </main>
  </div>

  <script src="lms/curriculum.js"></script>
  <script src="lms/app.js"></script>
</body>
</html>
